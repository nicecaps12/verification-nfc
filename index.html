const db = firebase.firestore();

const params = new URLSearchParams(window.location.search);
const productId = params.get("id") || "RS-0001";

const ref = db.collection("scans").doc(productId);

window.onload = () => {

    // 🔊 sonido al abrir
    document.getElementById("sound").play();

    ref.get().then((doc) => {
        let count = 1;

            ref.update({ count });
        } else {
            ref.set({ count: 1 });
        }

        document.getElementById("scanCount").innerText = count;

        setTimeout(() => {
            document.getElementById("loading").style.display = "none";
        }, 2000);
    });
};

const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_DOMINIO",
  projectId: "TU_PROJECT_ID",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 📌 ID dinámico (para diferentes gorras)
const params = new URLSearchParams(window.location.search);
const productId = params.get("id") || "RS-0001";

const ref = db.collection("scans").doc(productId);

// 🔊 sonido
window.onload = () => {
    document.getElementById("sound").play().catch(()=>{});
};

// 🚀 🔥 CONTADOR EN TIEMPO REAL
ref.onSnapshot((doc) => {
    if (doc.exists) {
        document.getElementById("scanCount").innerText = doc.data().count;
    } else {
        document.getElementById("scanCount").innerText = 0;
    }
});

// ➕ SUMAR ESCANEO (solo una vez por carga)
ref.get().then((doc) => {
    if (doc.exists) {
        ref.update({
            count: firebase.firestore.FieldValue.increment(1)
        });
    } else {
        ref.set({ count: 1 });
    }
});
</script>
